<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trace Debugger Bridge</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        width: 340px;
        background: #120f0d;
        color: #f5f5f4;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      .wrap {
        padding: 16px;
      }

      .eyebrow {
        color: #fbbf24;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      h1 {
        margin: 10px 0 8px;
        font-size: 22px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #d6d3d1;
        font-size: 13px;
        line-height: 1.55;
      }

      label {
        display: block;
        margin-top: 14px;
        margin-bottom: 6px;
        color: #e7e5e4;
        font-size: 12px;
        font-weight: 600;
      }

      input,
      textarea {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #44403c;
        border-radius: 14px;
        background: #0c0a09;
        color: #fafaf9;
        padding: 10px 12px;
        font: inherit;
      }

      textarea {
        min-height: 140px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 12px;
        line-height: 1.5;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        background: #fbbf24;
        color: #120f0d;
        flex: 1;
      }

      button.secondary {
        background: #1c1917;
        color: #fafaf9;
        border: 1px solid #44403c;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .status {
        min-height: 20px;
        margin-top: 10px;
        color: #a8a29e;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="eyebrow">Trace Debugger</div>
      <h1>Capture This Chat</h1>
      <p>Scrape the current ChatGPT or Claude conversation and open it inside your existing Trace Debugger app.</p>

      <label for="appUrl">Trace Debugger URL</label>
      <input id="appUrl" type="url" value="http://localhost:3000/" />

      <label for="tracePreview">Scraped trace</label>
      <textarea id="tracePreview" placeholder="Click capture to scrape the current page."></textarea>

      <div class="actions">
        <button id="captureButton" class="secondary" type="button">Capture</button>
        <button id="openButton" class="primary" type="button" disabled>Open In App</button>
      </div>

      <div class="status" id="status"></div>
    </div>

    <script src="popup.js"></script>
  </body>
  </html>
